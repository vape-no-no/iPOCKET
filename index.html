<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#050508">
<title>iPOCKET</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Safe area top patcher — runs before anything else -->
<script>
(function(){
  var p=document.createElement('div');
  p.style.cssText='position:fixed;top:env(safe-area-inset-top,59px);left:0;pointer-events:none;opacity:0;';
  document.documentElement.appendChild(p);
  function apply(){
    var r=p.getBoundingClientRect();
    var root=document.documentElement;
    root.style.setProperty('--st',Math.max(r.top,59)+'px');
    root.style.setProperty('--safe-top',Math.max(r.top,59)+'px');
  }
  apply();
  setTimeout(apply,80);
  setTimeout(apply,400);
  window.addEventListener('resize',apply);
  window.addEventListener('orientationchange',function(){setTimeout(apply,300);});
}());
</script>

<!-- HOME SCREEN -->
<div id="home">
  <div id="logo-wrap">
    <div id="title" data-text="iPOCKET">iPOCKET</div>
    <div id="tagline">v4.7 — Your Pocket OS</div>
  </div>
  <div id="home-date"></div>
  <div id="grid"></div>
</div>

<!-- APP LAYER -->
<div id="layer">
  <div id="app-content"></div>
  <div id="swipe-hint"></div>
</div>
